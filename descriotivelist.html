<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <!-- The <dl> (Description List) tag is used to create a list of terms and their descriptions -->
         <!-- 
    ! 
    description : 
    heading 

    HTML : 
         it is a hyper text markup language

    Tag : 
        it is keyword , that we use inside the <> that have some meaning , that help us to add the content in the web page 
    
        ! descriptive list :  dl  : collection /wrapper of dt & dd 
        ! data description : dd  { text of the terms }
        ! data term         : dt  { html , tag }


        ? dl >>> it tells the browser it is descriptive list 
        ? dt : it adds the text as a term 
        ? dd : it adds the text as a description of the term as well as it add the space in the LHS
        

        ! 
    -->
        <dl>
            <dt>HTML</dt>
            <dd>it is a hyper text markup language</dd>
            <dt>Tags</dt>
            <dd>it is keyword , that we use inside the <> that have some meaning , that
        help us to add the content in the web page</dd>
        </dl>
</body>
