



<!-- 
    >>>> structure of the html web page is known as boiler plate code

: boiler plate code :  type ! and hit the enter u get it 
   >  u need to write this code every time , why ? it is the structure of the html web page
   >  in html there is no error
   
-->

<!DOCTYPE html>

<!-- 
!  : importance 
Doctype  : it tells the browser the html version of this file , just after this we have html version -- html5.0 

html  : current html version of this current file : i.e.,html version of this file  
>>> if u write html , without any number that means it is html version 5 
-->

<html lang="en">
  <!-- 
html  : root, main parent , main wrapper , webpage code wrapper , because entire code is between the opening and closing of the html tag 

lang  : it store the value of the language that we are using in this file 
"en" : it is value of the lang 

-->

  <!-- 
! head : the code that i don't want in my ui, behind the website/ webpage code   
-->
  <head>
    <!-- data about the data, it is the additional information about the data , it is known as meta data , and for adding this meta data we have meta tag in html  -->

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 
        ! title : 
        -->
    <title>
      whatever u write inside this tag , it become the name of the web page,
      that u can see at the top of the tab in browser as well as when u
      bookmark, u need one name for the web page , the value of the title become
      the name of the web page
    </title>
  </head>
  <!-- 
! body : the code that i want in my ui, code that adds the content   
-->
  <body></body>
</html>
