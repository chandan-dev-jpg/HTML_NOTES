<!DOCTYPE html>

<body>
     <p>without dl inside dd</p>
     <dl>
        <dt>HTML 2</dt>
        <dd>
            <dt>November 24,1995</dt>
            <dd>first dd</dd>
            <dd>
                <ul>
                    <li>first</li>
                    <li>second</li>
                </ul>
            </dd>
        </dd>
     </dl>
     <hr>
     <p>with dl inside dd</p>
     <dl>
        <dt>HTML 2</dt>
        <dd>
            <dl>
                <dt>November 24,1995</dt>
                <dd>first dd</dd>
                <dd>
                    <ul>
                        <li>first</li>
                        <li>second</li>
                    </ul>
                </dd>
            </dl>
        </dd>
     </dl>
</body>
