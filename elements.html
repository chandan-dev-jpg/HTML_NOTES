

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 
    ! what is element : 
    >>>>> from opening to closing tag collectively known as html element : opening tag + attribute + content + closing tag 

    ? types of html elements : 3 types 
    ! >>> inline level elements

            >> take the  space as per the requirement

            * >>  it starts from the new line if there is no space in the same line else start just after the element { only inline element }

            >> we can't change the height and width  
            
            style="border: solid ; width: 50%;" 
            :: we get only border but there is no change in the width   

            >> eg : a tag 


    ! >>> block level elements

            >> take the  total 100% width space / size 

            * >> it always starts from the new line doesn't matter we have the space or not in the same line 
            
            >> we can change the height and width

            style="border: solid ; width: 50%;" 

              :: we get border as well as changes in the width   

            >> eg : heading tags : h1 to h6 , p tag 


    ! >> inline-block level elements :
         ?  by default it is inline but we can change the height and width as well . 
         >>> eg : img tag 
    
    -->

    <img src="./img1.png" alt="" width="600" />
    <img src="./img1.png" alt="" width="600" />
    <img src="./img1.png" alt="" width="600" />

    <h1->this</h1->
    <p>this element</p>
    <h1>this is</h1>

    <a href="">demo1</a>
    <a href="">demo2</a>
    <a href="">demo3</a>
  </body>
</html>
